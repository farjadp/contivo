version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: contivo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: contivo_dev
    ports:
      - "5432:5432"
    volumes:
      - contivo_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: contivo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - contivo_redis_data:/data

volumes:
  contivo_postgres_data:
  contivo_redis_data:
